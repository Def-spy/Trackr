name: trackr-watcher

on:
  schedule:
    # Times are UTC. ≈ 07:00 / 13:00 UK during BST (summer); 06:00/12:00 UK in winter (GMT).
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch: {}   # manual trigger button in the Actions tab

# Allow the job to push the updated state file back to the repo.
permissions:
  contents: write

concurrency:
  group: trackr-watcher
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # No third-party deps — script is stdlib-only — but kept for future-proofing.
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run watcher
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python watcher.py

      - name: Commit updated state
        run: |
          git config user.name  "trackr-watcher[bot]"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain state.json)" ]; then
            git add state.json
            git commit -m "chore: update trackr state [skip ci]"
            git push
          else
            echo "No state change to commit."
          fi
